<!DOCTYPE html>
<html>
<head>
    <title>My AI Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #05010a;
            color: white;
        }

        /* Header */
        .header {
            background: #0f0c29;
            color: #00f7ff;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            box-shadow: 0 0 10px #00f7ff;
        }

        /* Chat container */
        #chatbox {
            height: 80vh;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        /* Message bubbles */
        .message {
            max-width: 60%;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            word-wrap: break-word;
            box-shadow: 0 0 8px rgba(255,255,255,0.2);
        }

        /* User message (right) */
        .user {
            background: #6a00ff;
            color: white;
            align-self: flex-end;
            box-shadow: 0 0 10px #6a00ff;
        }

        /* Bot message (left) */
        .bot {
            background: #00f7ff;
            color: black;
            align-self: flex-start;
            box-shadow: 0 0 10px #00f7ff;
        }

        /* Input area */
        .input-area {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0f0c29;
            padding: 10px;
            box-shadow: 0 -2px 10px #00f7ff;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            outline: none;
            background: #1a1a2e;
            color: white;
            box-shadow: 0 0 8px #00f7ff;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 50%;
            background: #ff00ff;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 10px #ff00ff;
        }

        button:hover {
            background: #ff33ff;
            box-shadow: 0 0 20px #ff00ff;
        }
    </style>
</head>

<body>

<div class="header">🤖 Neon AI Assistant</div>

<div id="chatbox"></div>

<div class="input-area">
    <input id="input" placeholder="Type a message..." />
    <button onclick="sendMessage()">➤</button>
</div>

<script>
async function sendMessage() {
    let input = document.getElementById("input");
    let message = input.value;

    if (!message) return;

    let chatbox = document.getElementById("chatbox");

    // User message
    chatbox.innerHTML += `<div class="message user">${message}</div>`;

    input.value = "";

    chatbox.scrollTop = chatbox.scrollHeight;

    let response = await fetch(`http://127.0.0.1:8000/chat?prompt=${encodeURIComponent(message)}`);
    let data = await response.json();

    // Bot message
    chatbox.innerHTML += `<div class="message bot">${data}</div>`;

    chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

</body>
</html>
